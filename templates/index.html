<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>File Organizer</title>
</head>
<!-- <link rel="stylesheet" href="../static/style.css"> -->
<link rel="stylesheet" href="../static/style_new.css">

<body>

    <div class="container">
        <h1>📁 File Organizer</h1>

        ```
        <input type="text" id="folderPath" placeholder="Enter folder path">
        <br>
        <button class="btn-blue" onclick="setFolder()">Confirm</button>

        <br><br>

        <button class="btn-green" onclick="preview()">Preview</button>
        <button class="btn-purple" onclick="organize()">Organize</button>
        <button class="btn-orange" onclick="undo()">Undo</button>
        <button class="btn-red" onclick="exportCSV()">Export CSV</button>
        <h3>Custom Categories</h3>

        <input type="text" id="categoryName" placeholder="Category Name">
        <input type="text" id="categoryExt" placeholder=".js,.ts,.html">

        <button style="background-color: green;" onclick="addCategory()">Add</button>

        <div id="categoryList"></div>
        <!-- Loader -->
        <div id="loading">
            <div class="loader"></div>
            Processing...
        </div>

        <!-- Progress Bar -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <h3>Result:</h3>
        <pre id="output"></pre>
        <h4>Developed By: SK</h4>

    </div>

    <script src="../static/script.js"></script>

</body>

</html>
